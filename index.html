<!DOCTYPE html>

<body>

<h1>Ejemplo GitHub Flow</h1>

<label>Ingresa tu nombre:</label>
<input type="text" id="nombre">

<button onclick="saludar()">Saludar</button>

<script>

    let nombre = document.getElementById("nombre").value;
    alert("Hola " + nombre);
}
</script>
